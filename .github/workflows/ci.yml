name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - shared
          - api-gateway
          - auth-service
          - repo-service
          - parser-service
          - graph-service
          - ai-service
          - search-service
          - workers

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build @ace/shared
        run: npm run build --workspace=@ace/shared

      - name: Build service
        if: matrix.service != 'shared'
        run: |
          workspace="@ace/${{ matrix.service }}"
          npm run build --workspace="$workspace"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=@ace/frontend
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_API_URL: 'http://localhost:4000'

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint-and-build, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build all images
        run: docker compose build
