version: "3.9"

networks:
  ace-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  qdrant_data:
  minio_data:
  typesense_data:
  repos_data:
  repos_clone_data:

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aceuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acepassword}
      POSTGRES_DB: ${POSTGRES_DB:-acedb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - ace-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aceuser} -d ${POSTGRES_DB:-acedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ];
        then redis-server --requirepass "$$REDIS_PASSWORD";
        else redis-server;
        fi'
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-neo4jpassword}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - ace-network

  typesense:
    image: typesense/typesense:0.25.2
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-typesense-local-api-key}
    volumes:
      - typesense_data:/data
    ports:
      - "8108:8108"
    networks:
      - ace-network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend Services
  # ─────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:4001
      REPO_SERVICE_URL: http://repo-service:4002
      PARSER_SERVICE_URL: http://parser-service:4003
      GRAPH_SERVICE_URL: http://graph-service:4004
      SEARCH_SERVICE_URL: http://search-service:4005
      AI_SERVICE_URL: http://ai-service:4006
    ports:
      - "4000:4000"
    depends_on:
      auth-service:
        condition: service_started
      repo-service:
        condition: service_started
      parser-service:
        condition: service_started
      graph-service:
        condition: service_started
      search-service:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  auth-service:
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4001
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql://aceuser:acepassword@postgres:5432/acedb
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  repo-service:
    build:
      context: .
      dockerfile: backend/services/repo-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4002
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql://aceuser:acepassword@postgres:5432/acedb
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
    volumes:
      - repos_data:/app/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  parser-service:
    build:
      context: .
      dockerfile: backend/services/parser-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4003
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql://aceuser:acepassword@postgres:5432/acedb
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
    volumes:
      - repos_data:/app/repos:ro
      - repos_clone_data:/tmp/ace-repos:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  graph-service:
    build:
      context: .
      dockerfile: backend/services/graph-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4004
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql://aceuser:acepassword@postgres:5432/acedb
      NEO4J_URI: bolt://neo4j:7687
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  search-service:
    build:
      context: .
      dockerfile: backend/services/search-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4005
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql://aceuser:acepassword@postgres:5432/acedb
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
      QDRANT_HOST: qdrant
      QDRANT_URL: http://qdrant:6333
      TYPESENSE_HOST: typesense
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      typesense:
        condition: service_started
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4005/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  ai-service:
    build:
      context: .
      dockerfile: backend/services/ai-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4006
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql://aceuser:acepassword@postgres:5432/acedb
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
      QDRANT_HOST: qdrant
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - ace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4006/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  workers:
    build:
      context: .
      dockerfile: backend/workers/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aceuser:acepassword@postgres:5432/acedb
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_HOST: qdrant
      TYPESENSE_HOST: typesense
      MINIO_HOST: minio
      PARSER_SERVICE_URL: http://parser-service:4003
      GRAPH_SERVICE_URL: http://graph-service:4004
      SEARCH_SERVICE_URL: http://search-service:4005
      AI_SERVICE_URL: http://ai-service:4006
    volumes:
      - repos_clone_data:/tmp/ace-repos
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      parser-service:
        condition: service_started
      graph-service:
        condition: service_started
    networks:
      - ace-network

  # ─────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - ace-network

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - api-gateway
    networks:
      - ace-network
